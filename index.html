<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero-panel">
            <div class="hero-copy">
                <p class="eyebrow">Medical Data Console</p>
                <h1>Hospital Management</h1>
                <p class="hero-subtitle">醫院資料</p>
            </div>
            <div class="hero-grid" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </header>

        <main class="layout-grid">
            <section class="panel panel-table">
                <div class="panel-header panel-header-stack">
                    <div>
                        <h2>醫院資料</h2>
                        <p class="panel-note">保留原本資料內容，補上更順手的搜尋、排序與刪除操作。</p>
                    </div>
                    <div class="toolbar">
                        <label class="toolbar-field" for="searchInput">
                            <span>搜尋</span>
                            <input type="search" id="searchInput" placeholder="搜尋醫院或醫師">
                        </label>
                        <button type="button" class="toolbar-button" id="sortButton" data-sort="asc">日期排序：舊到新</button>
                    </div>
                </div>

                <div class="table-shell">
                    <table id="hospitalDataTable">
                        <thead>
                            <tr>
                                <th>醫院</th>
                                <th>醫師</th>
                                <th>處方簽一</th>
                                <th>處方簽二</th>
                                <th>回診日期</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>

                <div class="mobile-cards" id="mobileCards"></div>
                <p class="empty-state" id="emptyState" hidden>目前沒有符合搜尋條件的資料。</p>
            </section>

            <section class="panel panel-form">
                <div class="panel-header">
                    <h2>CRUD</h2>
                </div>

                <form id="hospitalForm" novalidate>
                    <label for="hospital">醫院：</label>
                    <input type="text" id="hospital" name="hospital" required>

                    <label for="doctor">醫師：</label>
                    <input type="text" id="doctor" name="doctor" required>

                    <label for="prescription1">處方簽一日期：</label>
                    <input type="date" id="prescription1" name="prescription1" required>

                    <label for="prescription2">處方簽二日期：</label>
                    <input type="date" id="prescription2" name="prescription2" required>

                    <label for="prescription3">回診日期：</label>
                    <input type="date" id="prescription3" name="prescription3" required>

                    <p class="form-status" id="formStatus" aria-live="polite">請輸入完整資料後送出。</p>
                    <button type="submit" id="submitButton">新增</button>
                </form>
            </section>
        </main>
    </div>

    <div class="toast" id="toast" hidden></div>

    <script src="script.js"></script>
</body>
</html>
