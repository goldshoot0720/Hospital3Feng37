<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-shell">
        <header class="hero-panel">
            <div class="hero-copy">
                <p class="eyebrow">Medical Data Console</p>
                <h1>Hospital Management</h1>
                <p class="hero-subtitle">醫院資料</p>
            </div>
            <div class="hero-grid" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
                <span></span>
            </div>
        </header>

        <main class="layout-grid">
            <section class="panel panel-table">
                <div class="panel-header">
                    <h2>醫院資料</h2>
                </div>

                <div class="table-shell">
                    <table id="hospitalDataTable">
                        <thead>
                            <tr>
                                <th>醫院</th>
                                <th>醫師</th>
                                <th>處方簽一</th>
                                <th>處方簽二</th>
                                <th>回診日期</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Dynamic rows will be inserted here -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section class="panel panel-form">
                <div class="panel-header">
                    <h2>CRUD</h2>
                </div>

                <form id="hospitalForm">
                    <label for="hospital">醫院：</label>
                    <input type="text" id="hospital" name="hospital" required>

                    <label for="doctor">醫師：</label>
                    <input type="text" id="doctor" name="doctor" required>

                    <label for="prescription1">處方簽一日期：</label>
                    <input type="date" id="prescription1" name="prescription1" required>

                    <label for="prescription2">處方簽二日期：</label>
                    <input type="date" id="prescription2" name="prescription2" required>

                    <label for="prescription3">回診日期：</label>
                    <input type="date" id="prescription3" name="prescription3" required>

                    <button type="submit" id="submitButton">新增</button>
                </form>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
